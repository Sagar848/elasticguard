# ═══════════════════════════════════════════════════════════════
#  ElasticGuard — Minimal Install (dev / laptop testing)
#
#  Usage:
#    helm install elasticguard ./elasticguard \
#      -n elasticguard --create-namespace \
#      -f values-minimal.yaml
#
#  Then port-forward:
#    kubectl port-forward -n elasticguard svc/elasticguard-frontend 3000:3000
# ═══════════════════════════════════════════════════════════════

ai:
  defaultProvider: ollama

ollama:
  enabled: true
  models:
    - llama3.2            # skip nomic-embed-text to save disk/time
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 6Gi

backend:
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

frontend:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

prometheus:
  enabled: false

grafana:
  enabled: false
