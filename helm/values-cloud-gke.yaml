# ═══════════════════════════════════════════════════════════════
#  ElasticGuard — GKE (Google Kubernetes Engine) Values
#
#  Prerequisites:
#   - GKE cluster with GCE Ingress or nginx-ingress
#   - Workload Identity configured (optional, for GCP API access)
#   - Images pushed to Artifact Registry
#
#  Usage:
#    helm install elasticguard ./elasticguard \
#      -n monitoring --create-namespace \
#      -f values-cloud-gke.yaml \
#      --set app.secretKey=$(openssl rand -hex 32) \
#      --set ai.openai.apiKey=$OPENAI_KEY
# ═══════════════════════════════════════════════════════════════

global:
  storageClass: "standard-rwo"   # GKE standard storage class

backend:
  image:
    repository: us-central1-docker.pkg.dev/YOUR_PROJECT/elasticguard/backend
    tag: "1.0.0"
  replicaCount: 2
  persistence:
    size: 5Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

frontend:
  image:
    repository: us-central1-docker.pkg.dev/YOUR_PROJECT/elasticguard/frontend
    tag: "1.0.0"
  replicaCount: 2

ingress:
  enabled: true
  className: nginx     # or gce for GCE native ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
  hosts:
    - host: elasticguard.your-domain.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
  apiHosts:
    - host: elasticguard-api.your-domain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: elasticguard-tls
      hosts:
        - elasticguard.your-domain.com
        - elasticguard-api.your-domain.com

ai:
  defaultProvider: openai
  existingSecret: elasticguard-ai-keys

ollama:
  enabled: false

prometheus:
  enabled: true
  persistence:
    size: 20Gi

grafana:
  enabled: true
  existingSecret: elasticguard-grafana-admin

networkPolicy:
  enabled: true

podDisruptionBudget:
  backend:
    enabled: true
    minAvailable: 1
  frontend:
    enabled: true
    minAvailable: 1
