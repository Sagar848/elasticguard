# ╔══════════════════════════════════════════════════════════════╗
# ║           ElasticGuard Helm Chart — values.yaml             ║
# ║                                                              ║
# ║  Override any value via:                                     ║
# ║    helm install elasticguard ./elasticguard \               ║
# ║      -f my-values.yaml                                       ║
# ║    or --set key=value                                        ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Global ────────────────────────────────────────────────────────────────────
global:
  # Image pull secrets for private registries
  imagePullSecrets: []
  # nameOverride: ""
  # fullnameOverride: ""

  # Storage class for PersistentVolumeClaims (leave empty for cluster default)
  storageClass: ""

  # Labels added to every resource
  labels: {}

# ── Backend ───────────────────────────────────────────────────────────────────
backend:
  enabled: true

  image:
    repository: your-registry/elasticguard-backend
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 8000

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

  # Horizontal pod autoscaling
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # Liveness / readiness probes
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3

  # ChromaDB vector store persistence
  persistence:
    enabled: true
    storageClass: ""          # overrides global.storageClass
    size: 2Gi
    accessMode: ReadWriteOnce
    mountPath: /app/data/chroma

  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: [ALL]

  # Node scheduling
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Extra environment variables
  extraEnv: []
  # - name: MY_VAR
  #   value: "my-value"

  # Extra envFrom (ConfigMaps / Secrets)
  extraEnvFrom: []
  # - secretRef:
  #     name: my-secret

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  enabled: true

  image:
    repository: your-registry/elasticguard-frontend
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 3000

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 30

  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 15
    periodSeconds: 10

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: "nginx"            # nginx | traefik | alb | gce

  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # cert-manager.io/cluster-issuer: letsencrypt-prod
  # nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  # nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  # nginx.ingress.kubernetes.io/proxy-http-version: "1.1"          # WebSocket
  # nginx.ingress.kubernetes.io/configuration-snippet: |
  #   proxy_set_header Upgrade $http_upgrade;
  #   proxy_set_header Connection "upgrade";

  # Frontend host
  hosts:
    - host: elasticguard.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend       # frontend | backend

  # Backend API — expose separately or via path prefix
  apiHosts:
    - host: elasticguard-api.example.com
      paths:
        - path: /
          pathType: Prefix

  tls: []
  # - secretName: elasticguard-tls
  #   hosts:
  #     - elasticguard.example.com
  #     - elasticguard-api.example.com

# ── AI Configuration ──────────────────────────────────────────────────────────
ai:
  # Default provider: openai | gemini | anthropic | ollama | custom
  defaultProvider: ollama

  openai:
    apiKey: ""                  # use existingSecret instead in production
    model: gpt-4o
    baseUrl: ""                 # leave empty for official API

  gemini:
    apiKey: ""
    model: gemini-1.5-pro

  anthropic:
    apiKey: ""
    model: claude-3-5-sonnet-20241022

  ollama:
    # URL to Ollama — auto-set to in-cluster Ollama if ollama.enabled=true
    baseUrl: ""                 # auto-configured when ollama.enabled=true
    model: llama3.2
    embedModel: nomic-embed-text

  custom:
    baseUrl: ""
    apiKey: ""
    model: ""

  # Reference an existing Kubernetes Secret for API keys
  # Secret must have keys: OPENAI_API_KEY, GEMINI_API_KEY, ANTHROPIC_API_KEY
  existingSecret: ""

# ── Notifications ─────────────────────────────────────────────────────────────
notifications:
  discord:
    webhookUrl: ""
    botToken: ""
    channelId: ""

  slack:
    webhookUrl: ""
    botToken: ""
    channelId: ""

  smtp:
    host: ""
    port: 587
    user: ""
    password: ""
    from: ""
    # Comma-separated list of recipient emails
    notificationEmails: ""

  # Reference an existing Secret containing notification credentials
  # Keys: DISCORD_WEBHOOK_URL, SLACK_WEBHOOK_URL, SMTP_PASS, etc.
  existingSecret: ""

# ── App Settings ──────────────────────────────────────────────────────────────
app:
  # Random string — MUST be changed in production
  secretKey: "change-me-to-random-32-char-string"
  approvalWebhookSecret: "change-me-approval-secret"

  # Monitoring
  monitoringIntervalSeconds: 30
  approvalTimeoutMinutes: 60

  # Alert thresholds (%)
  alertCpuThreshold: 80
  alertJvmThreshold: 85
  alertDiskThreshold: 85

# ── Ollama (Local LLM) ────────────────────────────────────────────────────────
ollama:
  enabled: true

  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 11434

  # Models to pull on startup (init container)
  models:
    - llama3.2
    - nomic-embed-text

  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi

  # GPU support — requires NVIDIA device plugin in cluster
  gpu:
    enabled: false
    # Number of GPUs to request
    count: 1
    # Resource key: nvidia.com/gpu or amd.com/gpu
    resourceKey: "nvidia.com/gpu"

  persistence:
    enabled: true
    storageClass: ""
    size: 20Gi                  # models can be large; 20Gi minimum recommended
    accessMode: ReadWriteOnce

  nodeSelector: {}
  tolerations: []
  # Example — run Ollama only on GPU nodes:
  # tolerations:
  #   - key: nvidia.com/gpu
  #     operator: Exists
  #     effect: NoSchedule
  # nodeSelector:
  #   accelerator: nvidia-tesla-t4

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  enabled: true

  image:
    repository: prom/prometheus
    tag: latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9090

  # Scrape interval for ElasticGuard metrics
  scrapeInterval: 15s

  # Data retention
  retentionTime: 7d

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi
    accessMode: ReadWriteOnce

  nodeSelector: {}
  tolerations: []

  # ServiceMonitor for Prometheus Operator (if installed in cluster)
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 15s
    labels: {}

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  enabled: true

  image:
    repository: grafana/grafana
    tag: latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3000

  # Admin credentials — use existingSecret in production
  adminUser: admin
  adminPassword: elasticguard

  # Reference existing secret with keys: admin-user, admin-password
  existingSecret: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    storageClass: ""
    size: 2Gi
    accessMode: ReadWriteOnce

  nodeSelector: {}
  tolerations: []

# ── ServiceAccount ────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""
  annotations: {}
  # For IRSA on EKS:
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/elasticguard-role

# ── Pod Disruption Budget ─────────────────────────────────────────────────────
podDisruptionBudget:
  backend:
    enabled: false
    minAvailable: 1
  frontend:
    enabled: false
    minAvailable: 1

# ── Network Policy ────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  # When enabled, only allows:
  # - frontend → backend (port 8000)
  # - backend → ollama   (port 11434)
  # - prometheus → backend (port 8000)
  # - grafana → prometheus (port 9090)
  # - ingress controller → frontend/backend

# ── Extra manifests ───────────────────────────────────────────────────────────
# Raw Kubernetes YAML to include in the release
extraManifests: []
# - apiVersion: v1
#   kind: ConfigMap
#   metadata:
#     name: my-extra-config
#   data:
#     key: value
