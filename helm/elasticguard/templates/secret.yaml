{{/*
ElasticGuard — Secret
Holds all sensitive config: API keys, SMTP credentials, app secrets.
*/}}
{{- if not .Values.ai.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "elasticguard.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "elasticguard.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ── App ─────────────────────────────────────────────────────────────────────
  SECRET_KEY: {{ .Values.app.secretKey | quote }}
  APPROVAL_WEBHOOK_SECRET: {{ .Values.app.approvalWebhookSecret | quote }}

  # ── AI Providers ─────────────────────────────────────────────────────────────
  DEFAULT_AI_PROVIDER: {{ .Values.ai.defaultProvider | quote }}
  OPENAI_API_KEY: {{ .Values.ai.openai.apiKey | quote }}
  OPENAI_DEFAULT_MODEL: {{ .Values.ai.openai.model | quote }}
  {{- if .Values.ai.openai.baseUrl }}
  OPENAI_BASE_URL: {{ .Values.ai.openai.baseUrl | quote }}
  {{- end }}
  GEMINI_API_KEY: {{ .Values.ai.gemini.apiKey | quote }}
  GEMINI_DEFAULT_MODEL: {{ .Values.ai.gemini.model | quote }}
  ANTHROPIC_API_KEY: {{ .Values.ai.anthropic.apiKey | quote }}
  ANTHROPIC_DEFAULT_MODEL: {{ .Values.ai.anthropic.model | quote }}
  OLLAMA_BASE_URL: {{ include "elasticguard.ollama.url" . | quote }}
  OLLAMA_DEFAULT_MODEL: {{ .Values.ai.ollama.model | quote }}
  OLLAMA_EMBED_MODEL: {{ .Values.ai.ollama.embedModel | quote }}
  {{- if .Values.ai.custom.baseUrl }}
  CUSTOM_AI_BASE_URL: {{ .Values.ai.custom.baseUrl | quote }}
  CUSTOM_AI_KEY: {{ .Values.ai.custom.apiKey | quote }}
  CUSTOM_AI_MODEL: {{ .Values.ai.custom.model | quote }}
  {{- end }}

  # ── Notifications ─────────────────────────────────────────────────────────────
  {{- if .Values.notifications.discord.webhookUrl }}
  DISCORD_WEBHOOK_URL: {{ .Values.notifications.discord.webhookUrl | quote }}
  {{- end }}
  {{- if .Values.notifications.discord.botToken }}
  DISCORD_BOT_TOKEN: {{ .Values.notifications.discord.botToken | quote }}
  {{- end }}
  {{- if .Values.notifications.discord.channelId }}
  DISCORD_CHANNEL_ID: {{ .Values.notifications.discord.channelId | quote }}
  {{- end }}
  {{- if .Values.notifications.slack.webhookUrl }}
  SLACK_WEBHOOK_URL: {{ .Values.notifications.slack.webhookUrl | quote }}
  {{- end }}
  {{- if .Values.notifications.slack.botToken }}
  SLACK_BOT_TOKEN: {{ .Values.notifications.slack.botToken | quote }}
  {{- end }}
  {{- if .Values.notifications.slack.channelId }}
  SLACK_CHANNEL_ID: {{ .Values.notifications.slack.channelId | quote }}
  {{- end }}
  {{- if .Values.notifications.smtp.host }}
  SMTP_HOST: {{ .Values.notifications.smtp.host | quote }}
  SMTP_PORT: {{ .Values.notifications.smtp.port | quote }}
  SMTP_USER: {{ .Values.notifications.smtp.user | quote }}
  SMTP_PASS: {{ .Values.notifications.smtp.password | quote }}
  SMTP_FROM: {{ .Values.notifications.smtp.from | quote }}
  NOTIFICATION_EMAILS: {{ .Values.notifications.smtp.notificationEmails | quote }}
  {{- end }}
{{- end }}
