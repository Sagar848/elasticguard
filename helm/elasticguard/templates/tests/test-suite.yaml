---
# ── Test 5: Ollama API reachability ──────────────────────────
{{- if .Values.ollama.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "elasticguard.fullname" . }}-test-ollama
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "elasticguard.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-ollama
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Testing Ollama API..."
          RESULT=$(wget -qO- http://{{ include "elasticguard.ollama.fullname" . }}:{{ .Values.ollama.service.port }}/api/tags 2>&1)
          if echo "$RESULT" | grep -q "models"; then
            echo "✅ Ollama API PASSED"
            echo "Available models: $RESULT"
          else
            echo "❌ Ollama API FAILED (models may still be pulling)"
            exit 1
          fi
      resources:
        requests: { cpu: 10m, memory: 16Mi }
        limits:   { cpu: 50m, memory: 32Mi }
{{- end }}

