version: '3.9'

# ═══════════════════════════════════════════════════════
#  ElasticGuard — Full Stack Docker Compose
#
#  Services:
#   - backend    FastAPI + LangGraph agents  :8000
#   - frontend   Next.js 14 UI              :3000
#   - ollama     Local Llama LLM            :11434
#   - prometheus Metrics scraper            :9090
#   - grafana    Dashboards                 :3001
#
#  Quick start:  docker-compose up -d
#  Logs:         docker-compose logs -f backend
#  Stop:         docker-compose down
# ═══════════════════════════════════════════════════════

services:

  # ── FastAPI Backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elasticguard-backend
    platform: linux/amd64
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/app/data/chroma
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://ollama:11434
    env_file:
      - .env
    # depends_on:
    #   - ollama
    restart: unless-stopped
    networks:
      - elasticguard
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: elasticguard-frontend
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - elasticguard

  # ── Ollama Local LLM ─────────────────────────────────
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: elasticguard-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped
  #   networks:
  #     - elasticguard
  #   # ── GPU (uncomment for NVIDIA) ────────────────────
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: 1
  #   #           capabilities: [gpu]

  # # ── Pull Ollama models on first boot ─────────────────
  # ollama-init:
  #   image: ollama/ollama:latest
  #   container_name: elasticguard-ollama-init
  #   depends_on:
  #     - ollama
  #   networks:
  #     - elasticguard
  #   entrypoint: >
  #     sh -c "
  #       echo 'Waiting for Ollama...' &&
  #       sleep 8 &&
  #       OLLAMA_HOST=http://ollama:11434 ollama pull llama3.2 &&
  #       OLLAMA_HOST=http://ollama:11434 ollama pull nomic-embed-text &&
  #       echo 'All models ready'
  #     "
  #   restart: "no"

  # ── Prometheus ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: elasticguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - elasticguard

  # ── Grafana ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: elasticguard-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=elasticguard
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3000
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/elasticguard.json
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - elasticguard

volumes:
  chroma_data:
  ollama_data:
  prometheus_data:
  grafana_data:

networks:
  elasticguard:
    driver: bridge
