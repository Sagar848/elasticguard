# ═══════════════════════════════════════════════════════════════════════════════
#  ElasticGuard — Air-Gapped / Private Registry Docker Compose
#
#  All image references use the REGISTRY_PREFIX variable.
#  Set it in your shell or in .env.airgap before running:
#
#    export REGISTRY_PREFIX=artifactory.corp.com/docker-hub/
#    docker compose -f docker-compose.airgap.yml up -d
#
#  Or let start.sh handle it automatically:
#    ./start.sh docker-private
#
#  The REGISTRY_PREFIX is prepended to every upstream image name, so:
#    python:3.11-slim       → artifactory.corp.com/docker-hub/python:3.11-slim
#    node:20-alpine         → artifactory.corp.com/docker-hub/node:20-alpine
#    ollama/ollama:latest   → artifactory.corp.com/docker-hub/ollama/ollama:latest
#
#  Your Artifactory (or Nexus/Harbor/JFrog) must proxy or cache Docker Hub.
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.9'

x-build-args: &build-args
  REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}

services:

  # ── Backend: FastAPI Python ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        <<: *build-args
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    image: ${REGISTRY_PREFIX:-}elasticguard-backend:${TAG:-latest}
    container_name: elasticguard-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/elasticguard.db
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - KNOWLEDGE_BASE_DIR=/app/knowledge/docs
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEFAULT_AI_PROVIDER=${DEFAULT_AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - NOTIFICATION_EMAILS=${NOTIFICATION_EMAILS:-}
      - MONITORING_INTERVAL_SECONDS=${MONITORING_INTERVAL_SECONDS:-30}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
    volumes:
      - elasticguard-data:/app/data
      - ./backend/knowledge:/app/knowledge:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - elasticguard

  # ── Frontend: Next.js ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        <<: *build-args
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: ${REGISTRY_PREFIX:-}elasticguard-frontend:${TAG:-latest}
    container_name: elasticguard-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - elasticguard

  # ── Ollama (optional local LLM) ─────────────────────────────────────────────
  ollama:
    image: ${REGISTRY_PREFIX:-}${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: elasticguard-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - ollama
    networks:
      - elasticguard

volumes:
  elasticguard-data:
  ollama-data:

networks:
  elasticguard:
    driver: bridge
