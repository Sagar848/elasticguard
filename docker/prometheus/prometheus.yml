global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

rule_files: []

scrape_configs:
  # ElasticGuard metrics
  - job_name: 'elasticguard'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: /metrics/prometheus/metrics
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
