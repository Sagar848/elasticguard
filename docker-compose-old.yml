# ═══════════════════════════════════════════════════════════════════════════════
#  ElasticGuard — Standard Docker Compose
#  For air-gapped environments, use: docker-compose.airgap.yml
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.9'

services:

  # ── Backend: FastAPI Python ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # REGISTRY_PREFIX is empty by default — images pulled from Docker Hub
      # Override for private registries: REGISTRY_PREFIX=myregistry.com/ docker compose up
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
        PYTHON_IMAGE: python:3.11-slim
    image: elasticguard-backend:${TAG:-latest}
    container_name: elasticguard-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/elasticguard.db
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - KNOWLEDGE_BASE_DIR=/app/knowledge/docs
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEFAULT_AI_PROVIDER=${DEFAULT_AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_CHANNEL_ID=${SLACK_CHANNEL_ID:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - NOTIFICATION_EMAILS=${NOTIFICATION_EMAILS:-}
      - MONITORING_INTERVAL_SECONDS=${MONITORING_INTERVAL_SECONDS:-30}
      - ALERT_CPU_THRESHOLD=${ALERT_CPU_THRESHOLD:-80}
      - ALERT_JVM_THRESHOLD=${ALERT_JVM_THRESHOLD:-85}
      - ALERT_DISK_THRESHOLD=${ALERT_DISK_THRESHOLD:-85}
    volumes:
      - elasticguard-data:/app/data
      - ./backend/knowledge:/app/knowledge:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - elasticguard

  # ── Frontend: Next.js ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
        NODE_IMAGE: node:20-alpine
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    image: elasticguard-frontend:${TAG:-latest}
    container_name: elasticguard-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - elasticguard

  # ── Ollama (optional local LLM) ─────────────────────────────────────────────
  # ollama:
  #   image: ${REGISTRY_PREFIX:-}${OLLAMA_IMAGE:-ollama/ollama:latest}
  #   container_name: elasticguard-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   profiles:
  #     - ollama
  #   networks:
  #     - elasticguard

volumes:
  elasticguard-data:
  ollama-data:

networks:
  elasticguard:
    driver: bridge
